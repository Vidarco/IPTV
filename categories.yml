# Category rules. First match wins, evaluated top-to-bottom.
# Each rule has:
#   category:  one of News, Music, Sports, Kids, Movies, Religious, Entertainment, General
#   keywords:  case-insensitive substrings to match against group-title and channel name

rules:
  # ------------------------- News -------------------------
  - category: News
    keywords:
      - news
      - khabar
      - press tv
      - bbc persian
      - voa
      - iran international
      - radio farda
      - manoto news
      - euronews
      - irinn
      - khabar farsi
      - tolo news
      - afghanistan international
      - persiana news
      - gem news
      - شبکه خبر
      - خبر
      - اخبار

  # ------------------------- Sports -------------------------
  - category: Sports
    keywords:
      - sport
      - varzesh
      - football
      - soccer
      - irib3
      - irib 3
      - ورزش
      - فوتبال

  # ------------------------- Music -------------------------
