# Upstream M3U sources to aggregate.
#
# `country_filter` and `language_filter` (lowercase ISO codes) are applied if the
# source is broad. For sources that are already pre-filtered to Iran/Persian
# (e.g. iptv-org's ir.m3u), leave the filters empty to take everything.
#
# `enabled: false` to temporarily skip a source without deleting it.

sources:
  - name: iptv-org-country-ir
    url: https://iptv-org.github.io/iptv/countries/ir.m3u
    enabled: true
    country_filter: []
    language_filter: []

  - name: iptv-org-language-fas
    url: https://iptv-org.github.io/iptv/languages/fas.m3u
    enabled: true
    country_filter: []
    language_filter: []

  # Diaspora / Persian-only list maintained on Gitee.
  # Adds GEM family extras (Junior, Kids, USA), Andisheh, Iran-e Farda,
  # Hispan TV, Al-Alam, Imam Hussein TV, ICC TV, Esra TV, and several IRIB feeds.
  - name: gitee-null_063_9458-ir
    url: https://gitee.com/null_063_9458/iptv/raw/master/channels/ir.m3u
    enabled: true
    country_filter: []
    language_filter: []

  - name: iptv-org-master
    url: https://iptv-org.github.io/iptv/index.m3u
    enabled: true
    country_filter: ["ir"]
    language_filter: ["fas", "per", "fa"]

  - name: free-tv-iptv-master
    url: https://raw.githubusercontent.com/Free-TV/IPTV/master/playlist.m3u8
    enabled: true
    country_filter: ["ir"]
    language_filter: ["fas", "per", "fa"]

  # Hand-curated channels (manual.m3u in repo root). Use this for streams
  # that demand a Referer header, or that aren't in any upstream list.
  # Each entry should include #EXTVLCOPT:http-referrer / http-user-agent lines.
  - name: manual
    url: manual.m3u
    enabled: true
    country_filter: []
    language_filter: []

  # Add more diaspora / community lists here as you discover them.
