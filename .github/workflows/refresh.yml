name: Refresh playlist

on:
  schedule:
    # Sundays at 04:00 UTC (~05:00 Berlin in winter, ~06:00 in summer)
    - cron: "0 4 * * 0"
  workflow_dispatch: {}  # allow manual runs from the Actions tab

permissions:
  contents: write

concurrency:
  group: refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install ffprobe
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends ffmpeg

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Run pipeline
        run: python run.py all

      - name: Commit updated playlist
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add output/iran-persian.m3u output/report.json
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          BREAKDOWN=$(python -c "import json; r=json.load(open('output/report.json')); print('total='+str(r['total'])+' '+' '.join(f'{k}={v}' for k,v in r['by_category'].items()))")
          git commit -m "chore: refresh playlist ($BREAKDOWN)"
          git push
